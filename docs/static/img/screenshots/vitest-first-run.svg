  <text x="269.5" y="22" font-family="'SF Pro','Segoe UI',system-ui,sans-serif" font-size="12" fill="#6c7086" text-anchor="middle">npx vitest run</text>
    <text x="16" y="67" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">  </tspan><tspan fill="#ffd866">Feature: </tspan><tspan fill="#ffffff">Account Holder withdraws cash</tspan></text>
    <text x="16" y="86" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    Account Holders should be able to withdraw cash at any of the</tspan></text>
    <text x="16" y="105" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    companies ATMs.</tspan></text>
    <text x="16" y="124" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    </tspan></text>
    <text x="16" y="143" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    Rules:</tspan></text>
    <text x="16" y="162" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    * Account Holders should have a valid keycard</tspan></text>
    <text x="16" y="181" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    * Have sufficient available funds</tspan></text>
    <text x="16" y="200" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    * The ATM has the necessary funds</tspan></text>
    <text x="16" y="219" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9"> </tspan></text>
    <text x="16" y="238" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    </tspan><tspan fill="#ffd866">Scenario: </tspan><tspan fill="#ffffff">Account has sufficient funds</tspan></text>
    <text x="16" y="257" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">      </tspan><tspan fill="#7ee787">√</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#ffd866">given</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#7ee787">the account holders account has the following:</tspan></text>
    <text x="16" y="276" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13" textLength="226.2" lengthAdjust="spacingAndGlyphs"><tspan fill="#d8dee9">          </tspan><tspan fill="#7f849c">┌─────────┬───────┐</tspan></text>
