    <text x="16" y="390" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13" textLength="226.2" lengthAdjust="spacingAndGlyphs"><tspan fill="#d8dee9">          </tspan><tspan fill="#7f849c">└─────────┴───────┘</tspan></text>
    <text x="16" y="409" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">      </tspan><tspan fill="#7ee787">√</tspan><tspan fill="#d8dee9">   </tspan><tspan fill="#ffd866">and</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#7ee787">the machine contains </tspan><tspan fill="#7ee8d5">&apos;1000&apos;</tspan><tspan fill="#7ee787"> dollars</tspan></text>
    <text x="16" y="428" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">      </tspan><tspan fill="#7ee787">√</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#ffd866">when</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#7ee787">the Account Holder requests </tspan><tspan fill="#7ee8d5">&apos;20&apos;</tspan><tspan fill="#7ee787"> dollars</tspan></text>
    <text x="16" y="447" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">      </tspan><tspan fill="#7ee787">√</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#ffd866">then</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#7ee787">the ATM should dispense </tspan><tspan fill="#7ee8d5">&apos;20&apos;</tspan><tspan fill="#7ee787"> dollars</tspan></text>
    <text x="16" y="466" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">      </tspan><tspan fill="#7ee787">√</tspan><tspan fill="#d8dee9">   </tspan><tspan fill="#ffd866">and</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#7ee787">the account balance should be </tspan><tspan fill="#7ee8d5">&apos;80&apos;</tspan><tspan fill="#7ee787"> dollars</tspan></text>
    <text x="16" y="485" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9"> </tspan></text>
