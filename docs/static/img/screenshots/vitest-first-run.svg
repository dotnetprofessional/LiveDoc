    <text x="16" y="523" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9"> </tspan></text>
    <text x="16" y="542" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    </tspan><tspan fill="#ffd866">Scenario: </tspan><tspan fill="#ffffff">Adding two numbers</tspan></text>
    <text x="16" y="561" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">      </tspan><tspan fill="#7ee787">√</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#ffd866">given</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#7ee787">I have entered 50 into the calculator</tspan></text>
    <text x="16" y="580" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">      </tspan><tspan fill="#7ee787">√</tspan><tspan fill="#d8dee9">   </tspan><tspan fill="#ffd866">and</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#7ee787">I have entered 70 into the calculator</tspan></text>
    <text x="16" y="599" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">      </tspan><tspan fill="#7ee787">√</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#ffd866">when</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#7ee787">I press add</tspan></text>
