    <text x="16" y="67" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">  </tspan><tspan fill="#ffd866">Feature: </tspan><tspan fill="#ffffff">Beautiful Tea Shipping Costs</tspan></text>
    <text x="16" y="86" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    * Australian customers pay GST</tspan></text>
    <text x="16" y="105" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    * Overseas customers don&apos;t pay GST</tspan></text>
    <text x="16" y="124" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    * Australian customers get free shipping for orders $100 and above</tspan></text>
    <text x="16" y="143" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    * Overseas customers all pay the same shipping rate regardless of order size</tspan></text>
    <text x="16" y="162" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9"> </tspan></text>
