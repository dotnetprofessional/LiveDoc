    <text x="16" y="219" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9"> </tspan></text>
    <text x="16" y="238" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">    </tspan><tspan fill="#ffd866">Scenario Outline: </tspan><tspan fill="#ffffff">Calculate GST status and shipping rate</tspan></text>
    <text x="16" y="257" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">       </tspan><tspan fill="#ffd866">given</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#7ee787">the customer is from </tspan><tspan fill="#7ee8d5">&lt;Customer&apos;s Country&gt;</tspan></text>
