    <text x="16" y="295" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace" font-size="13"><tspan fill="#d8dee9">       </tspan><tspan fill="#ffd866">then</tspan><tspan fill="#d8dee9"> </tspan><tspan fill="#7ee787">the customer pays </tspan><tspan fill="#7ee8d5">&lt;GST Amount&gt;</tspan><tspan fill="#7ee787"> GST</tspan></text>
