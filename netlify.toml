# Netlify configuration for LiveDoc documentation site
# https://docs.netlify.com/configure-builds/file-based-configuration/
#
# Builds are handled by GitHub Actions (see .github/workflows/ci.yml).
# This file provides runtime configuration only.

# SPA-style redirects for Docusaurus client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
